- type: entity
  name: holoparasite injector
  id: HoloparasiteInjector
  parent: [BaseItem, BaseSyndicateContraband]
  description: A complex artwork of handheld machinery allowing the user to host a holoparasite guardian.
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Specific/Medical/holoparasite_injector.rsi # DS14-resprite
    layers:
    - state: icon
  - type: Item
    sprite: _DeadSpace/Objects/Specific/Medical/holoparasite_injector.rsi # DS14-resprite
  - type: GuardianCreator
    guardianProto: MobHoloparasiteGuardian
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gas_analyzer/gas_analyzer_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gas_analyzer/gas_analyzer_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gas_analyzer/gas_analyzer_drop.ogg
  - type: UserInterface
    interfaces:
      enum.GuardianCreatorSelectorUiKey.Key:
        type: GuardianCreatorSelectorBoundUserInterface
  - type: GuardianCreatorSelector
    options:
    - prototype: MobHoloparasiteGuardianStandard
      name: guardian-selector-standard-name
      description: guardian-selector-standard-description
      details: guardian-selector-standard-details
    - prototype: MobHoloparasiteGuardianAssassin
      name: guardian-selector-assassin-name
      description: guardian-selector-assassin-description
      details: guardian-selector-assassin-details
    - prototype: MobHoloparasiteGuardianChaos
      name: guardian-selector-chaos-name
      description: guardian-selector-chaos-description
      details: guardian-selector-chaos-details
    - prototype: MobHoloparasiteGuardianCharger
      name: guardian-selector-charger-name
      description: guardian-selector-charger-description
      details: guardian-selector-charger-details
    #- prototype: MobHoloparasiteGuardianExplosive
    #  name: guardian-selector-explosive-name
    #  description: guardian-selector-explosive-description
    #  details: guardian-selector-explosive-details
    - prototype: MobHoloparasiteGuardianLightning
      name: guardian-selector-lightning-name
      description: guardian-selector-lightning-description
      details: guardian-selector-lightning-details
    - prototype: MobHoloparasiteGuardianProtector
      name: guardian-selector-protector-name
      description: guardian-selector-protector-description
      details: guardian-selector-protector-details
    - prototype: MobHoloparasiteGuardianRanged
      name: guardian-selector-ranged-name
      description: guardian-selector-ranged-description
      details: guardian-selector-ranged-details
    - prototype: MobHoloparasiteGuardianDexterous
      name: guardian-selector-dexterous-name
      description: guardian-selector-dexterous-description
      details: guardian-selector-dexterous-details
    - prototype: MobHoloparasiteGuardianSupport
      name: guardian-selector-support-name
      description: guardian-selector-support-description
      details: guardian-selector-support-details
    - prototype: MobHoloparasiteGuardianHealer
      name: guardian-selector-healer-name
      description: guardian-selector-healer-description
      details: guardian-selector-healer-details
  #DS14-End

- type: entity
  name: holoclown injector
  parent: HoloparasiteInjector
  id: HoloClownInjector
  description: A complex artwork of handheld machinery allowing the user to host a holoclown guardian.
  components:
  - type: GuardianCreator
    guardianProto: MobHoloClownGuardian
  # Sunrise-Start
  - type: GuardianCreatorSelector
    options:
    - prototype: MobHoloClownGuardian
      name: guardian-selector-holoclown-name
      description: guardian-selector-holoclown-description
      details: guardian-selector-holoclown-details
  # Sunrise-End

- type: entity
  name: magical lamp
  id: MagicalLamp
  parent: BaseItem
  description: The wizard federation had to cut costs after the jinn merchandise scandal somehow.
  components:
  - type: Sprite
    sprite: Objects/Misc/Lights/lamp.rsi
    layers:
      - state: lamp
  - type: GuardianCreator
    guardianProto: MobIfritGuardian

- type: entity
  name: holoparasite box
  parent: [BoxCardboard, BaseSyndicateContraband]
  id: BoxHoloparasite
  description: A box containing a holoparasite injector.
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: HoloparasiteInjector
        - id: HoloparasiteInfo
        - id: ClothingHeadHatBizarreSoft
  - type: Sprite
    layers:
      - state: box
      - state: holo

- type: entity
  name: holoclown box
  parent: [BoxCardboard, BaseSyndicateContraband]
  id: BoxHoloclown
  description: A box containing a holoclown injector.
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: HoloClownInjector
        - id: ToyFigurineHoloClown
        - id: ToyHammer
  - type: Sprite
    layers:
      - state: box_hug
      - state: holo
  - type: Tag
    tags:
    - BoxCardboard
    - BoxHug
