- type: entity
  abstract: true
  id: BaseSunriseHoloparasiteGuardian
  parent: MobGuardianBase
  components:
    - type: GhostRole
      allowMovement: true
      allowSpeech: true
      makeSentient: true
      name: ghost-role-information-holoparasite-name
      description: ghost-role-information-holoparasite-description
      rules: ghost-role-information-familiar-rules
      raffle:
        settings: default
    - type: GhostTakeoverAvailable
    - type: NameIdentifier
      group: Holoparasite
    - type: TypingIndicator
      proto: holo
    - type: HTN
      rootTask:
        task: SimpleHumanoidHostileCompound
    - type: ActionGrant
      actions:
      - ActionToggleGuardian
    - type: RandomSprite
      available: []
    - type: Fixtures
      fixtures:
        fix1:
          shape:
            !type:PhysShapeCircle
            radius: 0.35
          density: 25
          mask:
            - FlyingMobMask
          layer:
            - FlyingMobLayer
    - type: Puller
      needsHands: false

- type: entity
  parent: BaseSunriseHoloparasiteGuardian
  id: MobHoloparasiteGuardianStandard
  name: holoparasite
  description: A classic hard-light combat guardian with brutal armor-piercing punches.
  components:
  - type: Sprite
    layers:
    - state: tech_base
      map: [ "enum.DamageStateVisualLayers.Base" ]
    - state: tech_flare
      map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      color: "#40a7d7"
      shader: unshaded
  - type: Guardian
    damageShare: 0.4
    distanceAllowed: 10
  - type: MeleeWeapon
    attackRate: 1.8
    damage:
      types:
        Blunt: 20
        Structural: 100
    resistanceBypass: true
  - type: MeleeSpeech
    Battlecry: ORA
    MaxBattlecryLength: 8

- type: entity
  parent: BaseSunriseHoloparasiteGuardian
  id: MobHoloparasiteGuardianAssassin
  name: assassin holoparasite
  description: A quiet hard-light guardian tuned for stealth and lethal strikes.
  components:
  - type: Sprite
    layers:
    - state: magic_base
      map: [ "enum.DamageStateVisualLayers.Base" ]
    - state: magic_flare
      map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      color: "#7b4dff"
      shader: unshaded
  - type: Guardian
    damageShare: 1
    distanceAllowed: 10
  - type: Stealth
    examineThreshold: 0.35
    lastVisibility: 0.35
    minVisibility: -0.8
  - type: StealthOnMove
    passiveVisibilityRate: -0.3
    movementVisibilityRate: 0.55
  - type: MeleeWeapon
    attackRate: 1.4
    damage:
      types:
        Blunt: 30
        Poison: 5
  - type: InjectOnHit
    limit: 5
    reagents:
      - ReagentId: Toxin
        Quantity: 5

- type: entity
  parent: BaseSunriseHoloparasiteGuardian
  id: MobHoloparasiteGuardianChaos
  name: chaos holoparasite
  description: An unstable guardian that burns its targets with volatile hard-light.
  components:
  - type: Sprite
    layers:
    - state: magic_base
      map: [ "enum.DamageStateVisualLayers.Base" ]
    - state: magic_flare
      map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      color: "#ff5a36"
      shader: unshaded
  - type: Guardian
    damageShare: 0.8
    distanceAllowed: 10
  - type: GuardianChaosAttract
    speed: -15 #Anything above this pushes things too far away from the Wizard
    range: 5
    whitelist:
      components:
      - MobMover
      - Item
  - type: UseDelay
    delay: 10
  - type: UseDelayOnMeleeHit
  - type: IgniteOnMeleeHit
    fireStacks: 1
  - type: MeleeWeapon
    attackRate: 1.8
    damage:
      types:
        Heat: 15
        Structural: 20
    resistanceBypass: true

- type: entity
  parent: BaseSunriseHoloparasiteGuardian
  id: MobHoloparasiteGuardianCharger
  name: charger holoparasite
  description: A high-speed guardian that closes distance with violent leaps.
  components:
  - type: Sprite
    layers:
    - state: miner_base
      map: [ "enum.DamageStateVisualLayers.Base" ]
    - state: miner_flare
      map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      color: "#5ec7ff"
      shader: unshaded
  - type: Guardian
    damageShare: 0.6
    distanceAllowed: 10
  - type: MovementSpeedModifier
    baseWalkSpeed: 7
    baseSprintSpeed: 9
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 30
    soundHit:
      collection: MetalThud
  - type: StunOnCollide
    stunAmount: 0.5
    knockdownAmount: 2
    drop: false
  - type: JumpSkill
    actionJumpId: ActionGuardianCharge
    throwSpeed: 13
    throwRange: 8
    maxThrow: 8
  - type: WorldTargetActionKeybind
    action: ActionGuardianCharge
  - type: MeleeWeapon
    attackRate: 3.6
    damage:
      types:
        Blunt: 15
        Structural: 20
    resistanceBypass: true

- type: entity
