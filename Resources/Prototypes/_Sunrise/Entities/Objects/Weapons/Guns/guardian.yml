  - type: BasicEntityAmmoProvider
    proto: ProjectileGuardianHardlight
    capacity: 1
    count: 1
  - type: Gun
    soundGunshot:
      collection: EnergyMiss
    soundEmpty: null
    projectileSpeed: 18

- type: entity
  parent: BulletLaser
  id: ProjectileGuardianHardlight
  name: holoparasite hard-light bolt
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    impactEffect: BulletImpactEffectDisabler
    damage:
      types:
        Blunt: 18
    ignoreResistances: true
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
    layers:
    - state: heavylaser
      color: "#40a7d7"
      shader: unshaded

- type: entity
  categories: [ HideSpawnMenu ]
