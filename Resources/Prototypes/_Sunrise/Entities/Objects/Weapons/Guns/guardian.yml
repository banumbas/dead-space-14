    count: 1
  - type: Gun
    soundGunshot:
      collection: WeakHit
    soundEmpty: null
    projectileSpeed: 12

- type: entity
  parent: ProjectileHealingBolt
  id: ProjectileGuardianHealingBolt
  name: holoparasite healing bolt
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      groups:
        Brute: -5
        Burn: -5
        Airloss: -5
        Toxin: -5
    ignoreResistances: true
