# Hypo
- type: entity
  name: гипоспрей "Вкид"
  parent: BaseItem
  description: Что бы закинутся наркотой и прочим полезным самое то. Выдаётся сотрудникам MAXARM.
  categories: [ HideSpawnMenu ]
  id: HyposprayMysticalRayAlt
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/MysticalRayAlt/hypo.rsi
    layers:
      - state: hypo
        map: ["enum.SolutionContainerLayers.Base"]
      - state: hypo_fill1
        map: ["enum.SolutionContainerLayers.Fill"]
        visible: false
  - type: Item
    sprite: _DeadSpace/Sponsor/MysticalRayAlt/hypo.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 5
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
    exactVolume: true
  - type: Injector
    solutionName: hypospray
    ignoreClosed: false
    activeModeProtoId: HyposprayDynamicMode
    allowedModes:
    - HyposprayDynamicMode
    - HyposprayInjectMode
  - type: UseDelay
    delay: 0.5
  - type: StaticPrice
    price: 750
  - type: StealTarget
    stealGroup: Hypospray
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 4
    fillBaseName: hypo_fill
    solutionName: hypospray

