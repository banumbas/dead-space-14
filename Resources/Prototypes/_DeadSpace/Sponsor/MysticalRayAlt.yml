#melee
- type: entity
  parent: BaseItem
  id: telescopicBatonMysticalRayAlt
  categories: [ HideSpawnMenu ]
  name: телескопическая дубинка MAXARM
  description: Для того что бы дать понять что к тебе не стоит подходить без веской причины.
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/MysticalRayAlt/melee.rsi
    layers:
    - state: telescope_off
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: SwitchableWeapon
    openSound: "/Audio/_ADT/open_telescopic_baton.ogg"
    closeSound: "/Audio/_ADT/close_telescopic_baton.ogg"
    damageOpen:
      types:
        Blunt: 3
    damageFolded:
      types:
        Blunt: 0
    staminaDamageFolded: 0
    staminaDamageOpen: 30
  - type: StaminaDamageOnHit
    damage: 0
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 3
  - type: Item
    size: Small
    sprite: _DeadSpace/Sponsor/MysticalRayAlt/melee.rsi
  - type: UseDelay
    delay: 1
  - type: Appearance
  - type: GenericVisualizer
    visuals:
     enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: telescope_on}
          False: {state: telescope_off}

