- type: entity
  id: BaseFlippedTable
  parent: BaseStructure
  abstract: true
  components:
  - type: Sprite
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 55
        mask:
        - TableMask
        layer:
        - MidImpassable
        - LowImpassable
        - BulletImpassable
  - type: Damageable
    damageContainer: StructuralInorganic
  - type: Icon
  - type: FlippedTable
  - type: Tag
    tags:
    - ForceFixRotations

- type: entity
  id: FlippedTableSteel
  parent: BaseFlippedTable
  name: перевёрнутый стол
  description: Перевёрнутый на бок стол.
  components:
  - type: Sprite
    sprite: _DeadSpace/Structures/Furniture/Tables/flipped/steel.rsi
    state: icon
  - type: Icon
    sprite: _DeadSpace/Structures/Furniture/Tables/flipped/steel.rsi
    state: icon
  - type: FlippedTable
    originalTableId: Table
  - type: Damageable
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 125
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

