- type: entity
  parent: BaseSubdermalImplant
  id: AdrenalImplant
  name: adrenal implant
  description: An implant that will inject a dose of stimulants into you.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    implantAction: ActionActivateAdrenalImplant
  - type: InjectReagentsImplant
    popup: adrenal-implant-activated
    reagents:
      Stimulants: 30

- type: entity
  id: AdrenalImplanter
  suffix: adrenal
  parent: BaseImplantOnlyImplanterSyndi
  components:
  - type: Implanter
    implant: AdrenalImplant

- type: entity
  parent: BaseItem
  id: AutosurgeonRevive
  name: revive autosurgeon
  description: A multi-use auto surgeon for implanting whatever you want into yourself. Rip that station apart and make it part of your.
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Specific/Autosurgeon/autosurgeon.rsi
    layers:
    - state: iconBefore
  - type: ReviveImplant

- type: entity
  parent: BaseItem
  id: AutosurgeonAfter
  name: used Autosurgeon
  description: A multi-use auto surgeon for implanting whatever you want into yourself. Rip that station apart and make it part of your.
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Specific/Autosurgeon/autosurgeon.rsi
    layers:
    - state: iconAfter

- type: entity
  parent: BaseImplantOnlyImplanterSyndi
  id: MantisBladesImplanter
  name: имплантер
  suffix: клинки богомола
  components:
  - type: Implanter
    implant: MantisBladesImplant
  - type: Item
    sprite: _DeadSpace/Objects/Specific/Medical/mantis_implanter.rsi
    heldPrefix: implanter
  - type: Sprite
    sprite: _DeadSpace/Objects/Specific/Medical/mantis_implanter.rsi
    state: implanter1
    layers:
    - state: implanter0
      map: [ "implantFull" ]
      visible: true
    - state: implanter1
      map: [ "implantOnly" ]

- type: entity
  parent: BaseSubdermalImplant
  id: MantisBladesImplant
  name: военный имплант
  description: Нелегальный военный имплант, производимый корпорацией Cybersun. Устанавливает в руки пару клинков богомола.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    implantAction: ActionRetractableItemMantisBladesImplant
    whitelist:
      components:
      - Hands

- type: entity
  parent: BaseSubdermalImplant
  id: DeathRattleImplantTaipan
  name: предсмертный хрип
  description: Этот имплант информирует всех о физическом состоянии по частоте Тайпана.
  suffix: Тайпан
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    permanent: true
    whitelist:
      components:
      - MobState
  - type: TriggerOnMobstateChange
    mobState:
    - Critical
    - Dead
  - type: RattleOnTrigger
    radioChannel: Taipan
  - type: SuitSensor
    randomMode: false
    controlsLocked: true
    mode: SensorCords
    activationContainer: "implant"
  - type: DeviceNetwork
    deviceNetId: Wireless
    transmitFrequencyId: SuitSensorTaipan
  - type: StationLimitedNetwork
  - type: WirelessNetworkConnection
    range: 500

- type: entity
  id: DeathRattleImplanterTaipan
  parent: BaseImplantOnlyImplanterSyndi
  name: предсмертный хрип
  description: Этот имплант информирует всех о физическом состоянии по частоте Тайпана.
  suffix: Тайпан
  components:
  - type: Implanter
    implant: DeathRattleImplantTaipan

- type: entity
  parent: BaseSubdermalImplant
  id: RezervImplant
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    implantAction: ActionActivateRezervImplant
  - type: InjectReagentsImplant
    popup: rezerv-implant-activated
    reagents:
      Celestin: 29.9

- type: entity
  id: RezervImplanter
  suffix: Резерв
  parent: BaseImplantOnlyImplanter
  components:
  - type: Implanter
    implant: RezervImplant

- type: entity
  parent: BaseSubdermalImplant
  id: SandevistanImplant
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    implantAction: ActionActivateSandevistanImplant
  - type: SandevistanImplant
    duration: 17
    softcapTime: 12
    cooldownMultiplier: 1.5
    movementSpeedModifier: 1.7
    attackRateModifier: 1.75
    overloadInterval: 1
    overloadDamage:
      types:
        Slash: 5
        Piercing: 5
    exhaustionStaminaDamage: 100
    softcapPopupInterval: 2
    softcapPopupInitialDelay: 2
    shoutInitialDelay: 1.25
    shoutMinInterval: 3.5
    shoutMaxInterval: 4.5
    endWarningLeadTime: 5
    endWarningInterval: 2.5
    endWarningPopupCount: 1
    recoveryMovementSpeedModifier: 0.75
    recoveryTickInterval: 3
    recoveryDamage:
      types:
        Asphyxiation: 2
    recoveryJitterAmplitude: 3.5
    recoveryJitterFrequency: 18
    recoveryJitterRefreshTime: 0.35
    recoveryPopupInterval: 5
    initialJitterProgress: 0.2
    maxJitterHits: 5
    maxJitterAmplitude: 5
    maxJitterFrequency: 30
    jitterLerpRate: 5
    jitterRefreshTime: 0.35
    afterimageInterval: 0.01
    afterimageMinDistance: 1
    afterimageLifetime: 1.25
    deactivationVisualDuration: 1.5
    afterimageColor: "#00ffd0dd"
    afterimageFallbackEffect: MantisDodgeEffect
    popup: sandevistan-implant-activated

- type: entity
  id: SandevistanImplanter
  suffix: Сандевистан
  parent: BaseImplantOnlyImplanter
  categories: [ HideSpawnMenu ]
  components:
  - type: Implanter
    implant: SandevistanImplant
  - type: Item
    sprite: _DeadSpace/Objects/Specific/Medical/sandevistan-implanter.rsi
    heldPrefix: implanter
    storedRotation: -90
  - type: Sprite
    sprite: _DeadSpace/Objects/Specific/Medical/sandevistan-implanter.rsi
    state: implanter0
    layers:
    - state: implanter0
      map: [ "implantOnly" ]
    - state: implanter1
      map: [ "implantFull" ]
      visible: true

- type: entity
  id: SandevistanImplantCase
  suffix: Дебаг, НЕ СПАВНИТЬ
  parent: [ BaseStorageItem, BaseBagOpenClose ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Specific/Medical/sandevistan-case.rsi
    layers:
    - state: open
      map: [ "openLayer" ]
      visible: false
    - state: c1
      map: [ "c1" ]
      visible: false
    - state: closed
      map: [ "closeLayer" ]
  - type: Item
    sprite: _DeadSpace/Objects/Specific/Medical/sandevistan-case.rsi
    size: Normal
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,1,0
    whitelist:
      components:
      - Implanter
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:EntSelector
        id: SandevistanImplanter
  - type: ItemMapper
    mapLayers:
      c1:
        whitelist:
          components:
          - Implanter
  - type: Appearance
