  components:
  - type: HoverIgnoresContactSlowdown
  - type: MovementSpeedModifier
    weightlessModifier: 0
    baseAcceleration: 1.7
    baseFriction: 0.8
    friction: 2
    frictionNoInput: 6.2
    baseWalkSpeed: 6
    baseSprintSpeed: 7.1
  - type: UnpoweredFlashlight
  - type: GenericKeyedVehicle
    containerId: key_slot
    keyWhitelist:
      tags:
      - KeyUniversal
  - type: Vehicle
    keyEjectRequiresOperator: true
    protectOperatorUnstrap: true
  - type: Strap
    position: Stand
    buckleOffset: "0.01,0.15"
    lockBuckleOffset: true
  - type: AmbientSound
    sound: /Audio/Effects/shuttle_thruster.ogg
    range: 8
    volume: 5
  - type: Sprite
    sprite: _DeadSpace/Objects/Vehicles/hoverbike.rsi
    drawdepth: Mobs
    layers:
    - state: vehicle
      map: ["movement"]
    - state: hull
      map: [ "enum.DamageStateVisualLayers.Base" ]
      color: "#8B0000"
    - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      state: lights
      shader: unshaded
      color: "#8B0000"
  - type: ItemSlots
    slots:
      key_slot:
        name: vehicle-slot-component-slot-name-keys
        whitelist:
          tags:
          - KeyUniversal
        insertSound:
          path: /Audio/Effects/Vehicle/vehiclestartup.ogg
          params:
            volume: -3
      bag:
        name: сумка
        whitelist:
          components:
            - Storage
        priority: 2
        insertSound:
          path: /Audio/Items/belt_equip.ogg
          params:
            volume: -3
  - type: Storage
    grid:
    - 0,0,1,1
    maxItemSize: Normal
    clickInsert: false
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ContainerContainer
    containers:
      key_slot: !type:ContainerSlot
      bag: !type:ContainerSlot
      storagebase: !type:Container
  - type: Appearance
  - type: PointLight
    enabled: false
    radius: 10.5
    softness: 2
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 250
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 250
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
      - !type:ExplodeBehavior

