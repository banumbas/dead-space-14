- type: entity
  id: BulletEnergyCrossbow
  name: bullet(crossbow)
  categories: [ HideSpawnMenu ]
  components:
  - type: HitscanAmmo
  - type: HitscanBasicRaycast
    collisionMask: BulletImpassable
    maxDistance: 40
  - type: HitscanReflect
    reflectiveType: NonEnergy
  - type: HitscanBasicVisuals
    bullet:
      sprite:
        sprite: _DeadSpace/Objects/Weapons/Guns/Projectiles/crossbowbullet.rsi
        state: bulletcrossbow
    speed: 315
  - type: HitscanBasicEffects
    sound:
      path: /Audio/Weapons/Guns/Hits/bullet_hit.ogg
  - type: HitscanBasicDamage
    damage:
      types:
        Poison: 10
  - type: StaminaDamageOnCollide
    damage: 20
  - type: StunOnCollide
    knockdownAmount: 3

- type: entity
  id: BulletEnergyCrossbowLarge
