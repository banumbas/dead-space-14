  categories: [ HideSpawnMenu ]
  components:
  - type: HitscanAmmo
  - type: HitscanBasicRaycast
    collisionMask: BulletImpassable
    maxDistance: 40
  - type: HitscanReflect
    reflectiveType: NonEnergy
  - type: HitscanBasicVisuals
    bullet:
      sprite:
        sprite: _DeadSpace/Objects/Weapons/Guns/Projectiles/crossbowbullet.rsi
        state: bulletcrossbow
    speed: 315
  - type: HitscanBasicEffects
