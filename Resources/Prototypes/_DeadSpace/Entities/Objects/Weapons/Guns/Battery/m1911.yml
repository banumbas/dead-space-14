- type: entity
  name: M-1911
  parent: [BaseWeaponBatterySmall, BaseGrandTheftContraband]
  id: WeaponEnergyM1911
  description: Мощный самозаряжающийся энергетический кольт, разработанный для Офицерского состава КСО. Имеет три режима стрельбы, позволяющие нелетально обезвреживать, стрелять малыми импульсными зарядами или же использовать всю мощность для максимальной эффективности.
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Weapons/Guns/Battery/m1911.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-unshaded-0
      visible: false
      map: [ "enum.GunVisualLayers.MagUnshaded" ]
      shader: unshaded
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: true
  - type: Appearance
  - type: Clothing
    sprite: _DeadSpace/Objects/Weapons/Guns/Battery/m1911.rsi
  - type: Tag
    tags:
    - HighRiskItem
    - Sidearm
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
  - type: BatteryAmmoProvider
    proto: LaserImpulseSMGBulletTrace
    fireCost: 50 
  - type: BatteryWeaponFireModes
    fireModes:
    - proto: LaserImpulseSMGBulletTrace
      fireCost: 50 
    - proto: MegaPulse
      fireCost: 100
    - proto: BulletDisablerTrace
      fireCost: 35 
      pacifismAllowedMode: true
  - type: BatterySelfRecharger
    autoRechargeRate: 48
    autoRechargePauseTime: 10 
