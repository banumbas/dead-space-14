- type: entity
  categories: [ HideSpawnMenu ]
  id: GuardianRangedGun
  name: holoparasite hard-light projector
  components:
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 0.6
  - type: BasicEntityAmmoProvider
    proto: BulletGuardianHardlightTrace
    capacity: 1
    count: 1
  - type: Gun
    soundGunshot:
      collection: EnergyMiss
    soundEmpty: null
    projectileSpeed: 18

- type: entity
  parent: EnergyBoltTrace
  id: BulletGuardianHardlightTrace
  name: holoparasite hard-light bolt
  categories: [ HideSpawnMenu ]
  components:
  - type: HitscanBasicRaycast
    collisionMask: BulletImpassable
    maxDistance: 13
  - type: HitscanBasicVisuals
    speed: 260
    bullet:
      sprite:
        sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
        state: heavylaser
      color: "#40a7d7"
  - type: HitscanBasicDamage
    damage:
      types:
        Blunt: 20
    ignoreResistances: true

- type: entity
  categories: [ HideSpawnMenu ]
  id: GuardianHealingGun
  name: holoparasite medical projector
  components:
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 6
  - type: BasicEntityAmmoProvider
    proto: ProjectileGuardianHealingBolt
    capacity: 1
    count: 1
  - type: Gun
    soundGunshot:
      collection: WeakHit
    soundEmpty: null
    projectileSpeed: 12

- type: entity
  parent: ProjectileHealingBolt
  id: ProjectileGuardianHealingBolt
  name: holoparasite healing bolt
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      groups:
        Brute: -35 # Heals approximately 15 HP
        Burn: -35
        Airloss: -35
        Toxin: -35
    ignoreResistances: true
