- type: entity
  name: фенек
  parent: SimpleMobBase
  id: MobFenek
  description: Миленький фенек, который любит, когда его гладят. Самый маленький представитель семейства псовых.
  components:
  - type: CarrySize
    size: Small
  - type: Sprite
    drawdepth: Mobs
    sprite: /Textures/_DeadSpace/Mobs/Animals/Fenek.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base", "movement"]
      state: fenek
  - type: SpriteMovement
    movementLayers:
      movement:
        state: fenek_move
    noMovementLayers:
      movement:
        state: fenek
  - type: DamageStateVisuals
    states:
      Alive:
        Base: fenek
      Critical:
        Base: fenek_dead
      Dead:
        Base: fenek_dead
  - type: InteractionPopup
    successChance: 1
    interactSuccessString: petting-success-soft-floofy
    interactFailureString: petting-failure-generic
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      collection: Fox
  - type: Butcherable
    spawned:
    - id: FoodMeat
      amount: 3
  - type: Tag
    tags:
    - CannotSuicide
    - VimPilot
  - type: Language
    knownLanguages:
    - GeneralLanguage
    cantSpeakLanguages:
    - GeneralLanguage
    unlockLanguagesAfterMakeSentient:
    - GeneralLanguage
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 50 #They actually are pretty light, I looked it up
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Grammar
    attributes:
      gender: epicene
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Blood
        Quantity: 100
  - type: MeleeWeapon
    angle: 0
    animation: WeaponArcBite
    soundHit:
      path: /Audio/Effects/bite.ogg
    damage:
      types:
        Piercing: 8
  - type: MessyDrinker

- type: entity
  name: спавнер фенека
  description: Спавнер крутого фенека.
  id: SpawnMobFenek
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: green
    - state: fenek
      sprite: _DeadSpace/Mobs/Animals/Fenek.rsi
  - type: ConditionalSpawner
    prototypes:
    - MobFenek